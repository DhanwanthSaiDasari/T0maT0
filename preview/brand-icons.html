<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><title>Iconography</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px 32px; background: var(--paper); display: flex; flex-direction: column; gap: 14px; }
  .row { display: flex; gap: 28px; align-items: center; }
  .ico { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .ico svg { width: 22px; height: 22px; stroke: var(--ink); fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
  .name { font-family: var(--font-mono); font-size: 10px; color: var(--ink-3); text-transform: uppercase; letter-spacing: 0.06em; }
  .note { font-family: var(--font-serif); font-size: 13px; color: var(--ink-2); line-height: 1.45; }
</style></head>
<body>
  <div class="row">
    <div class="ico"><svg viewBox="0 0 24 24"><polygon points="6 3 20 12 6 21 6 3"/></svg><span class="name">play</span></div>
    <div class="ico"><svg viewBox="0 0 24 24"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg><span class="name">pause</span></div>
    <div class="ico"><svg viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16"/></svg><span class="name">stop</span></div>
    <div class="ico"><svg viewBox="0 0 24 24"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/></svg><span class="name">skip</span></div>
    <div class="ico"><svg viewBox="0 0 24 24"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10 21a2 2 0 0 0 4 0"/></svg><span class="name">bell</span></div>
    <div class="ico"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg><span class="name">check</span></div>
  </div>
  <p class="note" style="margin:0;">Lucide-style · 1.5px stroke · 22px · always paired with a label. No emoji, no unicode glyphs as icons.</p>
</body></html>
