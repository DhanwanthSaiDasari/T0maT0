<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><title>Type — Display</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px 32px; background: var(--paper); }
  .row { display: flex; align-items: baseline; gap: 24px; }
  .num { font-family: var(--font-mono); font-weight: 500; font-size: 96px; line-height: 1; letter-spacing: -0.04em; font-variant-numeric: tabular-nums; color: var(--ink); }
  .meta { display: flex; flex-direction: column; gap: 4px; }
  .meta .label { font-family: var(--font-mono); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--ink-3); }
  .meta .val { font-family: var(--font-mono); font-size: 13px; color: var(--ink-2); }
</style></head>
<body>
  <div class="row">
    <div class="num">25:00</div>
    <div class="meta">
      <span class="label">Display / Timer</span>
      <span class="val">JetBrains Mono · 500 · 72px</span>
      <span class="val">tracking −4% · tabular-nums</span>
      <span class="val">used: timer numerals only</span>
    </div>
  </div>
</body></html>
