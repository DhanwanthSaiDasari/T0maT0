<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><title>Type — Body & Prose</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px 32px; background: var(--paper); display: grid; grid-template-columns: 1fr 1fr; gap: 32px; }
  .col { display: flex; flex-direction: column; gap: 6px; }
  .spec { font-family: var(--font-mono); font-size: 10px; color: var(--ink-3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
  p { margin: 0; }
</style></head>
<body>
  <div class="col">
    <span class="spec">Body / mono · JB Mono 400 · 16px</span>
    <p class="t-body">press space to start. esc to cancel. that's it.</p>
    <p class="t-small" style="margin-top:6px;">Small · JB Mono · 13px · used for hints, metadata.</p>
  </div>
  <div class="col">
    <span class="spec">Prose / serif · Newsreader 400 · 18px</span>
    <p class="t-prose">A pomodoro is twenty-five minutes of work followed by a short break. The technique is older than the apps that sell it.</p>
  </div>
</body></html>
