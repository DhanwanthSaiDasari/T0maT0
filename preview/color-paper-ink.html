<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><title>Color — Paper & Ink</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px 32px; background: var(--paper); display: grid; grid-template-columns: repeat(6, 1fr); gap: 14px; }
  .sw { display: flex; flex-direction: column; gap: 6px; }
  .chip { width: 100%; aspect-ratio: 1.4 / 1; border: 1px solid var(--rule); }
  .name { font-family: var(--font-mono); font-size: 11px; font-weight: 600; color: var(--ink); }
  .hex  { font-family: var(--font-mono); font-size: 10px; color: var(--ink-3); }
</style></head>
<body>
  <div class="sw"><div class="chip" style="background:#F5F1E8"></div><span class="name">paper</span><span class="hex">#F5F1E8</span></div>
  <div class="sw"><div class="chip" style="background:#ECE6D6"></div><span class="name">paper-2</span><span class="hex">#ECE6D6</span></div>
  <div class="sw"><div class="chip" style="background:#E0D8C2"></div><span class="name">paper-3</span><span class="hex">#E0D8C2</span></div>
  <div class="sw"><div class="chip" style="background:#6B6256"></div><span class="name">ink-3</span><span class="hex">#6B6256</span></div>
  <div class="sw"><div class="chip" style="background:#3A332C"></div><span class="name">ink-2</span><span class="hex">#3A332C</span></div>
  <div class="sw"><div class="chip" style="background:#1A1714"></div><span class="name">ink</span><span class="hex">#1A1714</span></div>
</body></html>
