<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><title>Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px 32px; background: var(--paper); display: flex; flex-wrap: wrap; gap: 14px; align-items: center; }
  .btn { font-family: var(--font-mono); font-size: 13px; font-weight: 600; padding: 10px 16px; background: var(--paper); border: 1px solid var(--ink); color: var(--ink); cursor: pointer; display: inline-flex; align-items: center; gap: 8px; text-transform: lowercase; }
  .btn:hover { background: var(--paper-2); }
  .btn-primary { background: var(--ink); color: var(--paper); }
  .btn-primary:hover { background: #000; }
  .btn-danger { background: var(--tomato); color: var(--paper); border-color: var(--tomato); }
  .btn-ghost { border-color: transparent; }
  .btn-ghost:hover { background: var(--paper-2); }
  .btn[disabled] { color: var(--ink-3); border-color: var(--rule-soft); cursor: not-allowed; }
  .label { font-family: var(--font-mono); font-size: 10px; color: var(--ink-3); text-transform: uppercase; letter-spacing: 0.06em; width: 100%; margin-top: 4px; }
</style></head>
<body>
  <button class="btn btn-primary">start <kbd class="kbd" style="background:var(--ink-2); color:var(--paper); border-color:#000;">SPACE</kbd></button>
  <button class="btn">pause <kbd class="kbd">SPACE</kbd></button>
  <button class="btn btn-danger">stop <kbd class="kbd" style="background:var(--tomato-deep); color:var(--paper); border-color:var(--tomato-deep);">ESC</kbd></button>
  <button class="btn btn-ghost">skip break</button>
  <button class="btn" disabled>start</button>
  <span class="label">primary · default · danger · ghost · disabled</span>
</body></html>
