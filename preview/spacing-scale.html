<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><title>Spacing Scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px 32px; background: var(--paper); display: flex; flex-direction: column; gap: 8px; }
  .row { display: grid; grid-template-columns: 80px 1fr 60px; gap: 16px; align-items: center; }
  .name { font-family: var(--font-mono); font-size: 12px; color: var(--ink); }
  .bar { height: 12px; background: var(--ink); }
  .px { font-family: var(--font-mono); font-size: 11px; color: var(--ink-3); text-align: right; }
</style></head>
<body>
  <div class="row"><span class="name">--s-1</span><div class="bar" style="width:4px"></div><span class="px">4px</span></div>
  <div class="row"><span class="name">--s-2</span><div class="bar" style="width:8px"></div><span class="px">8px</span></div>
  <div class="row"><span class="name">--s-3</span><div class="bar" style="width:12px"></div><span class="px">12px</span></div>
  <div class="row"><span class="name">--s-4</span><div class="bar" style="width:16px"></div><span class="px">16px</span></div>
  <div class="row"><span class="name">--s-5</span><div class="bar" style="width:24px"></div><span class="px">24px</span></div>
  <div class="row"><span class="name">--s-6</span><div class="bar" style="width:32px"></div><span class="px">32px</span></div>
  <div class="row"><span class="name">--s-7</span><div class="bar" style="width:48px"></div><span class="px">48px</span></div>
  <div class="row"><span class="name">--s-8</span><div class="bar" style="width:64px"></div><span class="px">64px</span></div>
  <div class="row"><span class="name">--s-9</span><div class="bar" style="width:96px"></div><span class="px">96px</span></div>
</body></html>
