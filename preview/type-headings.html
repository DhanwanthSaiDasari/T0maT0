<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><title>Type — Headings</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px 32px; background: var(--paper); }
  .stack { display: grid; grid-template-columns: 1fr 180px; column-gap: 32px; row-gap: 14px; align-items: baseline; }
  .spec { font-family: var(--font-mono); font-size: 11px; color: var(--ink-3); text-transform: uppercase; letter-spacing: 0.06em; }
</style></head>
<body>
  <div class="stack">
    <h1 class="t-h1" style="margin:0;">Twenty-five minutes.</h1>
    <span class="spec">H1 · Newsreader 500 · 40px</span>

    <h2 class="t-h2" style="margin:0;">That's it.</h2>
    <span class="spec">H2 · Newsreader 500 · 28px</span>

    <h3 class="t-h3" style="margin:0;">today's pomodoros</h3>
    <span class="spec">H3 · JB Mono 600 · 20px</span>
  </div>
</body></html>
