<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><title>Color — Accent</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px 32px; background: var(--paper); display: grid; grid-template-columns: repeat(3, 1fr) 1.4fr; gap: 18px; align-items: stretch; }
  .sw { display: flex; flex-direction: column; gap: 6px; }
  .chip { width: 100%; aspect-ratio: 1.6 / 1; border: 1px solid var(--rule); }
  .name { font-family: var(--font-mono); font-size: 11px; font-weight: 600; color: var(--ink); }
  .hex  { font-family: var(--font-mono); font-size: 10px; color: var(--ink-3); }
  .note { font-family: var(--font-serif); font-size: 14px; line-height: 1.45; color: var(--ink-2); border-left: 1px solid var(--rule); padding-left: 16px; }
</style></head>
<body>
  <div class="sw"><div class="chip" style="background:#D7301F"></div><span class="name">tomato</span><span class="hex">#D7301F</span></div>
  <div class="sw"><div class="chip" style="background:#A32212"></div><span class="name">tomato-deep</span><span class="hex">#A32212</span></div>
  <div class="sw"><div class="chip" style="background:#F5C9C2"></div><span class="name">tomato-tint</span><span class="hex">#F5C9C2</span></div>
  <div class="note">One accent. Used only when a timer is running, or to mark the focused element. Never decorative.</div>
</body></html>
