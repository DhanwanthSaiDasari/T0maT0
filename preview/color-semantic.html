<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><title>Color — Semantic</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px 32px; background: var(--paper); display: flex; flex-direction: column; gap: 14px; }
  .row { display: grid; grid-template-columns: 32px 110px 1fr 80px; gap: 14px; align-items: center; }
  .chip { width: 32px; height: 32px; border: 1px solid var(--rule); }
  .name { font-family: var(--font-mono); font-size: 12px; font-weight: 600; }
  .use  { font-family: var(--font-mono); font-size: 12px; color: var(--ink-2); }
  .hex  { font-family: var(--font-mono); font-size: 11px; color: var(--ink-3); text-align: right; }
</style></head>
<body>
  <div class="row"><div class="chip" style="background:#D7301F"></div><span class="name">tomato</span><span class="use">running timer · focus indicator</span><span class="hex">#D7301F</span></div>
  <div class="row"><div class="chip" style="background:#2F6B3A"></div><span class="name">leaf</span><span class="use">completed pomodoro · only</span><span class="hex">#2F6B3A</span></div>
  <div class="row"><div class="chip" style="background:#2A2520"></div><span class="name">char</span><span class="use">break-mode background</span><span class="hex">#2A2520</span></div>
  <div class="row"><div class="chip" style="background:#C8BFA8"></div><span class="name">rule-soft</span><span class="use">secondary divider</span><span class="hex">#C8BFA8</span></div>
</body></html>
