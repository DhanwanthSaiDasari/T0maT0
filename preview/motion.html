<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><title>Motion</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px 32px; background: var(--paper); display: grid; grid-template-columns: 1fr 1fr; gap: 18px; align-items: start; }
  .row { display: flex; flex-direction: column; gap: 6px; }
  .label { font-family: var(--font-mono); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--ink-3); }
  .val { font-family: var(--font-mono); font-size: 14px; }
  .desc { font-family: var(--font-serif); font-size: 13px; color: var(--ink-2); line-height: 1.45; }
  hr { grid-column: 1 / -1; border: 0; border-top: 1px solid var(--rule-soft); margin: 4px 0; }
</style></head>
<body>
  <div class="row"><span class="label">--dur-1 · button press</span><span class="val">80ms</span></div>
  <div class="row"><span class="label">--dur-2 · hover, focus</span><span class="val">160ms</span></div>
  <div class="row"><span class="label">--dur-3 · state change</span><span class="val">320ms</span></div>
  <div class="row"><span class="label">--ease</span><span class="val">cubic-bezier(0.2, 0, 0, 1)</span></div>
  <hr>
  <p class="desc" style="grid-column:1/-1; margin:0;">Fast-out, settled-in. No bounces. No spring physics. The timer numerals do not animate as they tick — digit changes are instant.</p>
</body></html>
