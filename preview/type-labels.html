<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><title>Type — Labels & Mono Hints</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px 32px; background: var(--paper); display: flex; flex-direction: column; gap: 16px; }
  .row { display: flex; align-items: center; gap: 14px; }
  .spec { font-family: var(--font-mono); font-size: 10px; color: var(--ink-3); text-transform: uppercase; letter-spacing: 0.06em; }
  hr { border: 0; border-top: 1px solid var(--rule-soft); margin: 0; }
</style></head>
<body>
  <div class="row">
    <span class="t-label">SESSION 03 / 04</span>
    <span class="spec">JB Mono 600 · 11px · UPPERCASE · +6%</span>
  </div>
  <hr>
  <div class="row">
    <span class="t-label" style="color: var(--tomato);">FOCUS</span>
    <span class="t-label">BREAK</span>
    <span class="t-label" style="color: var(--leaf);">DONE</span>
    <span class="spec" style="margin-left:auto;">state labels</span>
  </div>
  <hr>
  <div class="row">
    <kbd class="kbd">SPACE</kbd>
    <kbd class="kbd">ESC</kbd>
    <kbd class="kbd">⌘K</kbd>
    <span class="spec" style="margin-left:auto;">keycap · 11px · 1.5px bottom border</span>
  </div>
</body></html>
