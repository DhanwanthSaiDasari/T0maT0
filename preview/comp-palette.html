<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><title>Command Palette</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px 32px; background: var(--paper-2); display: flex; align-items: center; justify-content: center; }
  .palette { width: 100%; max-width: 520px; background: var(--paper); border: 1px solid var(--ink); }
  .input { padding: 12px 16px; border-bottom: 1px solid var(--rule); display: flex; align-items: center; gap: 10px; font-family: var(--font-mono); font-size: 14px; color: var(--ink); }
  .input .caret { color: var(--tomato); }
  .item { padding: 10px 16px; display: flex; align-items: center; gap: 12px; font-family: var(--font-mono); font-size: 13px; }
  .item.sel { background: var(--paper-2); }
  .item .name { flex: 1; }
  .item .keys { display: flex; gap: 4px; }
</style></head>
<body>
  <div class="palette">
    <div class="input"><span class="caret">›</span><span>start</span></div>
    <div class="item sel"><span class="name">start a 25 minute pomodoro</span><div class="keys"><kbd class="kbd">SPACE</kbd></div></div>
    <div class="item"><span class="name">start a long break (15 min)</span><div class="keys"><kbd class="kbd">⇧</kbd><kbd class="kbd">B</kbd></div></div>
    <div class="item"><span class="name">stop current</span><div class="keys"><kbd class="kbd">ESC</kbd></div></div>
  </div>
</body></html>
